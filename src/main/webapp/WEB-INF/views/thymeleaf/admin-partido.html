<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Admin - Gestionar Partido</title>
    <link rel="stylesheet" th:href="@{/css/header.css}"/>
    <link rel="stylesheet" th:href="@{/css/footer.css}"/>
    <link rel="stylesheet" th:href="@{/css/temporada.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>

<div th:replace="layout/header :: header"></div>

<main class="contenedor-admin-vista">

    <!-- Encabezado con score actual -->
    <div class="card-partido-vivo">
        <div class="equipo-score">
            .-           <img th:src="${partido.equipoLocal.escudoImagen}" class="escudo"
                 th:alt="${partido.equipoLocal.nombre}"/>
            <span class="nombre-equipo-partido" th:text="${partido.equipoLocal.nombre}">Local</span>
        </div>

        <div class="centro-partido">
            <span class="score-vivo"
                  th:text="${scoreLocal.puntos} + ' - ' + ${scoreVisitante.puntos}">0 - 0</span>
            <span class="estado-vivo">EN VIVO</span>
        </div>

        <div class="equipo-score">
            <img th:src="${partido.equipoVisitante.escudoImagen}" class="escudo"
                 th:alt="${partido.equipoVisitante.nombre}"/>
            <span class="nombre-equipo-partido" th:text="${partido.equipoVisitante.nombre}">Visitante</span>
        </div>
    </div>

    <!-- Cronologia actual -->
    <h2 class="subtitulo-seccion">Cronología ↓</h2>

    <ul class="cronologia-lista">
        <li th:each="evento : ${cronologia}" class="cronologia-item">
            <span class="cronologia-minuto" th:text="${evento.minuto} + ''''">14'</span>
            <span class="cronologia-descripcion" th:text="${evento.descripcion}">Evento</span>
            <span class="cronologia-tipo-puntaje"
                  th:if="${evento.tipo == 'PUNTAJE'}"
                  th:text="'+' + ${evento.puntosSumados} + ' pts'">+3 pts</span>
            <span class="cronologia-tipo-plantel"
                  th:if="${evento.tipo == 'PLANTEL'}">Cambio</span>
        </li>
    </ul>

    <!-- Agregar cronologia PUNTAJE -->
    <div class="panel-accion">
        <h3>Agregar Cronología Puntaje</h3>
        <form th:action="@{/admin/agregarCronologiaPuntaje}" method="post" class="formulario-partido">
            <input type="hidden" name="idPartido" th:value="${partido.id}"/>

            <div class="campos-inline">
                <div class="campo-formulario">
                    <label>Minuto</label>
                    <input type="number" name="minuto" min="0" required/>
                </div>
                <div class="campo-formulario">
                    <label>Descripción</label>
                    <input type="text" name="descripcion" placeholder="Ej: Triple de Curry" required/>
                </div>
                <div class="campo-formulario">
                    <label>Puntos</label>
                    <select name="puntos" required>
                        <option value="1">1 pt (libre)</option>
                        <option value="2">2 pts</option>
                        <option value="3">3 pts (triple)</option>
                    </select>
                </div>
                <div class="campo-formulario">
                    <label>Equipo</label>
                    <select name="idEquipo" required>
                        <option th:value="${partido.equipoLocal.id}"
                                th:text="${partido.equipoLocal.nombre}">Local</option>
                        <option th:value="${partido.equipoVisitante.id}"
                                th:text="${partido.equipoVisitante.nombre}">Visitante</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn btn-naranja">Agregar Puntaje</button>
        </form>
    </div>

    <!-- Agregar cronologia PLANTEL -->
    <div class="panel-accion">
        <h3>Agregar Cronología Plantel</h3>
        <form th:action="@{/admin/agregarCronologiaPlantel}" method="post" class="formulario-partido">
            <input type="hidden" name="idPartido" th:value="${partido.id}"/>

            <div class="campos-inline">
                <div class="campo-formulario">
                    <label>Minuto</label>
                    <input type="number" name="minuto" min="0" required/>
                </div>
                <div class="campo-formulario">
                    <label>Jugador que sale</label>
                    <select name="idJugadorSale" required>
                        <optgroup th:label="${partido.equipoLocal.nombre}">
                            <option th:each="j : ${jugadoresLocal}"
                                    th:value="${j.id}"
                                    th:text="${j.nombre} + ' ' + ${j.apellido}">Jugador</option>
                        </optgroup>
                        <optgroup th:label="${partido.equipoVisitante.nombre}">
                            <option th:each="j : ${jugadoresVisitante}"
                                    th:value="${j.id}"
                                    th:text="${j.nombre} + ' ' + ${j.apellido}">Jugador</option>
                        </optgroup>
                    </select>
                </div>
                <div class="campo-formulario">
                    <label>Jugador que entra</label>
                    <select name="idJugadorEntra" required>
                        <optgroup th:label="${partido.equipoLocal.nombre}">
                            <option th:each="j : ${jugadoresLocal}"
                                    th:value="${j.id}"
                                    th:text="${j.nombre} + ' ' + ${j.apellido}">Jugador</option>
                        </optgroup>
                        <optgroup th:label="${partido.equipoVisitante.nombre}">
                            <option th:each="j : ${jugadoresVisitante}"
                                    th:value="${j.id}"
                                    th:text="${j.nombre} + ' ' + ${j.apellido}">Jugador</option>
                        </optgroup>
                    </select>
                </div>
            </div>
            <button type="submit" class="btn btn-naranja">Agregar Cambio</button>
        </form>
    </div>

    <!-- Finalizar partido -->
    <div class="panel-accion panel-finalizar">
        <h3>Finalizar Partido</h3>
        <form th:action="@{/admin/finalizarPartido}" method="post" class="formulario-partido">
            <input type="hidden" name="idPartido" th:value="${partido.id}"/>
            <div class="campo-formulario">
                <label>Minuto en que finalizó</label>
                <input type="number" name="minutoFin" min="1" required/>
            </div>
            <button type="submit" class="btn btn-rojo">Finalizar Partido</button>
        </form>
    </div>

    <a th:href="@{/admin/partidos}" class="btn btn-secundario" style="margin-top:1rem;">← Volver</a>

</main>

<div th:replace="layout/footer :: footer"></div>
</body>
</html>
