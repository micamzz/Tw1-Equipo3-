<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Equipos del Torneo</title>
    <link rel="stylesheet" th:href="@{/css/header.css}"/>
    <link rel="stylesheet" th:href="@{/css/footer.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin-asignar-jugadores.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>

<!--HEADER ADMIN -->
<div th:replace="layout/admin-header :: header-admin"></div>

<main class="contenedor-admin-vista">

    <div class="acciones-superiores">
        <h1 th:text="${torneo.nombreTorneo}">Torneo</h1>
        <a th:href="@{/admin/historialTemporada/{idTemporada}(idTemporada=${torneo.temporada.id})}"
           class="btn btn-naranja">VOLVER</a>
    </div>

    <table class="tabla-torneos">
        <thead>
        <tr>
            <th></th>
            <th></th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="equipo : ${equipos}">
            <td>
                <img th:src="${equipo.escudoImagen}"
                     th:alt="${equipo.nombre}"
                     width="80"
                     th:if="${equipo.escudoImagen != null}"/>
            </td>
            <td th:text="${equipo.nombre}">Nombre</td>
            <td>
                <a th:href="@{/admin/historialEquipoEnTorneo/{idTorneo}/{idEquipo}(idTorneo=${torneo.id},idEquipo=${equipo.id})}"
                   class="btn btn-naranja">VER</a>
            </td>
        </tr>
        </tbody>
    </table>

</main>

<div th:replace="layout/footer :: footer"></div>

</body>
</html>
