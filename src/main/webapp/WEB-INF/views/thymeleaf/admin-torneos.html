<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Torneos</title>
</head>
<body>

<h1>Administración de Torneos</h1>

<div th:if="${param.error}">
    <p th:text="${param.error}"></p>
</div>


<a th:href="@{/admin/torneo/crear}">
    Crear torneo
</a>

<table border="1">

    <thead>
    <tr>
        <th>Nombre</th>
        <th>Fecha Inicio</th>
        <th>Fecha Fin</th>
        <th>Estado</th>
        <th>Acciones</th>
    </tr>
    </thead>

    <tbody>

    <tr th:each="torneo : ${torneos}">

        <td th:text="${torneo.nombreTorneo}"></td>

        <td th:text="${torneo.fechaInicio}"></td>

        <td th:text="${torneo.fechaFin}"></td>

        <td th:text="${torneo.estadoTorneo}"></td>

        <td>

            <form th:action="@{/admin/torneo/eliminar}"
                  method="post">

                <input type="hidden"
                       name="id"
                       th:value="${torneo.id}"/>

                <button type="submit">
                    Eliminar
                </button>

            </form>

        </td>

    </tr>

    </tbody>

</table>

</body>
</html>
