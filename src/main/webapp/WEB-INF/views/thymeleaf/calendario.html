<!DOCTYPE HTML>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>Calendario NBA</title>

    <link rel="stylesheet" th:href="@{/css/calendario.css}" />
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
          rel="stylesheet" />
</head>

<body>
<!-- HEADER -->
<div th:replace="layout/header :: header"></div>

<main class="main-calendario">

    <div class="calendario-encabezado">
        <h1>Calendario NBA</h1>
        <p class="calendario-descripcion" th:text="${calendario.nombre}">Temporada 2024</p>
    </div>

    <section class="seccion-partidos">
        <h2 class="titulo-seccion">Próximos partidos</h2>

        <ul class="partidos-lista">
            <li th:each="partido : ${calendario.partidos}">
                <div class="card-partido-programado">

                    <!-- Equipo Local -->
                    <div class="equipo">
                            <span class="badge-equipo"
                                  th:text="${#strings.substring(partido.equipoLocal, 0, 3)}">LAL</span>
                        <span class="nombre-equipo"
                              th:text="${partido.equipoLocal}">Lakers</span>
                    </div>

                    <!-- Info central -->
                    <div class="info-central">
                        <span class="ronda">NBA Finals</span>
                        <span class="vs">VS</span>
                        <span class="horario" th:text="${partido.hora}">22:30</span>
                        <span class="fecha" th:text="${partido.fecha}">04/06/2026</span>
                    </div>

                    <!-- Equipo Visitante -->
                    <div class="equipo equipo-visitante">
                            <span class="badge-equipo badge-visitante"
                                  th:text="${#strings.substring(partido.equipoVisitante, 0, 3)}">BOS</span>
                        <span class="nombre-equipo"
                              th:text="${partido.equipoVisitante}">Celtics</span>
                    </div>

                </div>
            </li>
        </ul>

    </section>
    <section class="seccion-top">
        <h2 class="titulo-seccion">Jugadores destacados de esta temporada</h2>
        <ul class="top-lista">
            <li class="top-header">
                <span>#</span>
                <span>Jugador</span>
                <span>PTS</span>
                <span>REB</span>
                <span>ASI</span>
            </li>
            <li th:each="jugador, iter : ${topJugadores}" class="top-fila">
                <span class="top-posicion" th:text="${iter.count}">1</span>
                <span th:text="${jugador.nombreCompleto}">LeBron James</span>
                <span class="stat-naranja" th:text="${jugador.puntos}">30</span>
                <span th:text="${jugador.rebotes}">8</span>
                <span th:text="${jugador.asistencias}">7</span>
            </li>
        </ul>
    </section>
</main>

<!-- FOOTER -->
<div th:replace="layout/footer :: footer"></div>
</body>

</html>
