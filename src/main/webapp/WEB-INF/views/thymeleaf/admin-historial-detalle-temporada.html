<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Torneos de la Temporada</title>
    <link rel="stylesheet" th:href="@{/css/header.css}"/>
    <link rel="stylesheet" th:href="@{/css/footer.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin-asignar-jugadores.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>

<!--HEADER ADMIN -->
<div th:replace="layout/admin-header :: header-admin"></div>

<main class="contenedor-admin-vista">

    <div class="acciones-superiores">
        <h1>Torneos de la temporada: <span th:text="${temporada.nombre}"></span></h1>
        <a th:href="@{/admin/historialTemporadas}" class="btn btn-naranja">VOLVER</a>
    </div>

    <table class="tabla-torneos">
        <thead>
        <tr>
            <th>Nombre</th>
            <th>Tipo</th>
            <th>Fecha Inicio</th>
            <th>Fecha Fin</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="torneo : ${torneos}">
            <td th:text="${torneo.nombreTorneo}">Nombre</td>
            <td th:text="${torneo.tipoTorneo}">Tipo</td>
            <td th:text="${torneo.fechaInicio}">Inicio</td>
            <td th:text="${torneo.fechaFin}">Fin</td>
            <td>
                <a th:href="@{/admin/historialTorneo/{idTorneo}(idTorneo=${torneo.id})}"
                   class="btn btn-naranja">VER DETALLE</a>
            </td>
        </tr>
        </tbody>
    </table>

</main>

<div th:replace="layout/footer :: footer"></div>

</body>
</html>
