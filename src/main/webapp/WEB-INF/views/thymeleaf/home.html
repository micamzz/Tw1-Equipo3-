<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>UNLAM Basket - Home</title>

    <link rel="stylesheet" th:href="@{/css/header.css}"/>
    <link rel="stylesheet" th:href="@{/css/footer.css}"/>
    <link rel="stylesheet" th:href="@{/css/home.css}"/>

    <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
    />
</head>
<body>

<!--HEADER -->
<div th:replace="layout/header :: header"></div>


<main class="contenedor-home">

    <!-- HERO -->
    <section class="hero">
        <div class="hero-texto">
            <p class="hero-etiqueta">BIENVENID@ AL</p>
            <h1 class="hero-titulo">FANTASY <span class="color-naranja">NBA</span></h1>

            <!--    <p th:if="${usuario != null}">
               <p class="hero-saludo">Hola, <strong class="color-naranja" th:text="${usuario.nombre}"></strong> 👋</p>
               <p class="hero-descripcion">
                   Ya podés administrar tu equipo, seguir los partidos y competir en la liga.
               </p>
               </p>-->

            <strong th:text="${usuario != null ? usuario.nombre : 'Invitado'}"></strong>

            <div class="hero-botones">

                <a th:if="${equipo == null}" th:href="@{/crear-equipo}" class="boton boton-primario">
                    CREAR EQUIPO
                </a>

                <a th:if="${equipo != null}"
                   th:href="@{/equipo/detalle(id=${equipo.id})}"
                   class="boton boton-primario">
                    VER MI EQUIPO
                </a>

                <a th:href="@{/mercado}" class="boton boton-secundario">
                    VER MERCADO
                </a>

            </div>

            <!-- PUNTOS  -->
            <div class="card-mini">
                <h3 class="titulo-lateral">PUNTOS</h3>
                <p class="valor-dato highlight-number">
                    <span th:text="${equipo != null ? equipo.puntaje : 0}">0</span>
                </p>

            </div>

            <!-- PRESUPUESTO
            SI YA TIENE EQUIPO LE MUESTRA EL VALOR QUE LE QUEDA.
            SI NO LO CREO, LE MUESTRA EL VALOR INICIAL-->

            <div class="card-mini">
                <h3 class="titulo-lateral">PRESUPUESTO</h3>
                <p class="valor-dato" th:if="${equipo != null}">
                    $<span th:text="${equipo.presupuesto}">0</span>
                </p>
                <p class="valor-dato-mensaje" th:if="${equipo == null}">
                    Al crear tu equipo inicias con <strong>$<span th:text="${presupuestoInicial}"></span></strong>
                    para fichar jugadores.
                </p>
            </div>


        </div>

        <div class="hero-imagen">
            <img th:src="@{/img/fondo-home-user.png}" alt="Jugador NBA"/>
        </div>

        <!-- Aside ahora solo tiene próximos partidos -->
        <aside class="hero-lateral">
            <div class="card-lateral">
                <h3 class="titulo-lateral">PRÓXIMOS PARTIDOS</h3>
                <ul class="lista-partidos">
                    <li th:each="partido : ${proximosPartidos}" class="item-partido">
                    <span class="equipo-partido">
                        <img th:src="${partido.equipoLocal.escudoImagen}" alt="" class="escudo-chico"/>
                        <span th:text="${partido.equipoLocal.nombre}"></span>
                    </span>
                        <span class="vs">VS</span>
                        <span class="equipo-partido">
                        <span th:text="${partido.equipoVisitante.nombre}"></span>
                        <img th:src="${partido.equipoVisitante.escudoImagen}" alt="" class="escudo-chico"/>
                    </span>
                    </li>
                </ul>
                <a th:href="@{/partidos}" class="link-ver-todo">Ver todos los partidos </a>
            </div>
        </aside>
    </section>


</main>

<!--FOOTER-->
<div th:replace="layout/footer :: footer"></div>

</body>
</html>
