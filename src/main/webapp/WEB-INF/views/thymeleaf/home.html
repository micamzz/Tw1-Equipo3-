<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>UNLAM Basket - Home</title>

    <link rel="stylesheet" th:href="@{/css/header.css}"/>
    <link rel="stylesheet" th:href="@{/css/footer.css}"/>
    <link rel="stylesheet" th:href="@{/css/home.css}"/>

    <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
    />
</head>
<body>

<!--HEADER -->
<div th:replace="layout/header :: header"></div>

<main class="contenedor-home">

    <!-- HERO -->
    <section class="hero">
        <div class="hero-texto">
            <p class="hero-etiqueta">BIENVENID@ AL</p>
            <h1 class="hero-titulo">FANTASY <span class="color-naranja">NBA</span></h1>

            <!--    <p th:if="${usuario != null}">
                <p class="hero-saludo">Hola, <strong class="color-naranja" th:text="${usuario.nombre}"></strong> 👋</p>
                <p class="hero-descripcion">
                    Ya podés administrar tu equipo, seguir los partidos y competir en la liga.
                </p>
                </p>-->

            <strong th:text="${usuario != null ? usuario.nombre : 'Invitado'}"></strong>


            <div class="hero-botones">
                <a th:href="@{/crear-equipo}" class="boton boton-primario">CREAR EQUIPO
                </a>
                <a th:href="@{/mercado}" class="boton boton-secundario">
                    VER MERCADO
                </a>
            </div>
        </div>

        <div class="hero-imagen">
            <img th:src="@{/img/fondo-home-user.png}" alt="Jugador NBA"/>
        </div>

        <!-- PROXIMA JORNADA / TABLA DE POSICIONES (lateral derecho) -->
        <aside class="hero-lateral">

            <div class="card-lateral">
                <h3 class="titulo-lateral">PRÓXIMA JORNADA</h3>
                <p class="fecha-jornada"> Fecha <span th:text="${jornadaActual}">8</span></p>

                <ul class="lista-partidos">
                    <li th:each="partido : ${proximosPartidos}" class="item-partido">
                        <span class="equipo-partido">
                            <img th:src="${partido.equipoLocal.escudoImagen}" alt="" class="escudo-chico"/>
                            <span th:text="${partido.equipoLocal.nombre}">Lakers</span>
                        </span>
                        <span class="vs">VS</span>
                        <span class="equipo-partido">
                            <span th:text="${partido.equipoVisitante.nombre}">Celtics</span>
                            <img th:src="${partido.equipoVisitante.escudoImagen}" alt="" class="escudo-chico"/>
                        </span>
                    </li>
                </ul>

                <a th:href="@{/partidos}" class="link-ver-todo">Ver todos los partidos </a>
            </div>

            <div class="card-lateral">
                <h3 class="titulo-lateral">PUNTOS </h3>
                <p class="fecha-jornada"> Total : <span th:text="${jornadaActual}">8</span></p>

            </div>

            <!--ACA IRIA EL TORNEO REAL DE LA NBA Q SE ESTA JUGANDO-->
            <div class="card-lateral">

                <p class="titulo-lateral">JORNADA ACTUAL</p>
                <p class="valor-dato" th:text="${jornadaActual}">8</p>
                <p class="fecha-jornada" th:text="'Quedan ' + ${jornadasRestantes} + ' jornadas'">Quedan 14
                    jornadas</p>
            </div>


        </aside>
    </section>


</main>

<!--FOOTER-->
<div th:replace="layout/footer :: footer"></div>

</body>
</html>
