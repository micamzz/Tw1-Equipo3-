Admin confirmar finalizar temporada · HTML
<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Finalizar Temporada</title>
    <link rel="stylesheet" th:href="@{/css/header.css}"/>
    <link rel="stylesheet" th:href="@{/css/footer.css}"/>
    <link rel="stylesheet" th:href="@{/css/temporada.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>

<div th:replace="layout/header :: header"></div>

<main class="contenedor-admin-vista">

    <div class="acciones-superiores">
        <h1 th:text="${temporadaActual.nombre}">Temporada 2025</h1>
    </div>

    <div class="card-confirmacion">
        <h2>¿Estás seguro que deseas finalizar la temporada?</h2>
        <p>Al confirmar, la temporada actual se cerrará y se creará automáticamente la del siguiente año.</p>

        <div th:if="${error}" class="mensaje-error" th:text="${error}">Error</div>

        <form th:action="@{/admin/finalizarTemporada}" method="post">
            <div class="campo-formulario">
                <label for="fechaFin">Fecha en que finalizó la temporada</label>
                <input type="date" id="fechaFin" name="fechaFin" required/>
            </div>
            <div class="botones-confirmacion">
                <button type="submit" class="btn btn-rojo">Confirmar</button>
                <a th:href="@{/admin/historialTemporadas}" class="btn btn-secundario">Cancelar</a>
            </div>
        </form>
    </div>

</main>

<div th:replace="layout/footer :: footer"></div>
</body>
</html>
