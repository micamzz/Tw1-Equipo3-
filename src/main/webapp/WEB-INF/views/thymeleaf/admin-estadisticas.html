<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">

    <title>Registrar evento</title>

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/header.css}">
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/registrar-evento.css}">

    <!-- Fuente -->
    <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
            rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<div th:replace="layout/header :: header"></div>

<main>

    <a th:href="@{/admin/partidos}"
       class="volver-link">
        &larr; Volver a partidos
    </a>

    <h1>REGISTRAR EVENTO</h1>

    <h2 class="titulo-partido"
        th:text="${partido.equipoLocal.nombre + ' vs ' + partido.equipoVisitante.nombre}">
        Lakers vs Celtics
    </h2>

    <div th:if="${error}" class="mensaje-error">
        <p th:text="${error}"></p>
    </div>

    <div th:if="${success}" class="mensaje-exito">
        <p th:text="${success}"></p>
    </div>


    <div class="header-partido">

        <div class="equipo">
            <span th:text="${partido.equipoLocal.nombre}"></span>
        </div>

        <div class="resultado">

            <span th:text="${scoreLocal.puntos}"></span>

            <span> - </span>

            <span th:text="${scoreVisitante.puntos}"></span>

        </div>

        <div class="equipo">
            <span th:text="${partido.equipoVisitante.nombre}"></span>
        </div>

    </div>

    <section class="contenedor-form-evento">


        <form th:action="@{/partidos/{id}/eventos(id=${partido.id})}"
              th:object="${evento}"
              method="post">

            <div class="campo-formulario">

                <label for="jugador">
                    Jugador
                </label>

                <select id="jugador"
                        th:field="*{jugador.id}"
                        required>

                    <option value="">
                        Seleccione un jugador
                    </option>

                    <option
                            th:each="f : ${formacionLocal}"
                            th:value="${f.jugador.id}"
                            th:text="${f.jugador.nombre + ' ' + f.jugador.apellido}">
                    </option>

                </select>

            </div>

            <div class="campo-formulario">

                <label for="tipoEstadistica">
                    Tipo de evento
                </label>

                <select id="tipoEstadistica"
                        th:field="*{tipoEstadistica}"
                        required>

                    <option value="">
                        Seleccione un evento
                    </option>

                    <option th:each="tipo : ${tipos}"
                            th:value="${tipo}"
                            th:text="${tipo}">
                    </option>

                </select>

            </div>

            <div class="campo-formulario">

                <label for="momentoPartido">
                    Momento del partido
                </label>

                <input type="time"
                       id="momentoPartido"
                       th:field="*{momentoPartido}"
                       step="1"
                       required>

            </div>

            <button type="submit"
                    class="boton-guardar">

                REGISTRAR EVENTO

            </button>

        </form>

    </section>

    <div class="cronologia">

        <h2>Cronología</h2>

        <div
                class="evento"
                th:each="evento : ${eventos}">

        <span
                class="momento"
                th:text="${evento.momentoPartido}">
        </span>

            <span
                    class="jugador"
                    th:text="${evento.jugador.nombre}">
        </span>

            <span
                    class="tipo"
                    th:text="${evento.tipoEstadistica}">
        </span>

        </div>

    </div>

</main>

<!-- FOOTER -->
<div th:replace="layout/footer :: footer"></div>

</body>

</html>
