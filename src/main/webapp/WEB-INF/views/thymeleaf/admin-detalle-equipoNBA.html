<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Detalle Equipo NBA</title>
    <link rel="stylesheet" th:href="@{/css/header.css}"/>
    <link rel="stylesheet" th:href="@{/css/footer.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin-asignar-jugadores.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>

<div th:replace="layout/header :: header"></div>

<main class="contenedor">

    <p>Temporada: <strong th:text="${torneoActual.temporada.nombre}"></strong></p>
    <p>Torneo: <strong th:text="${torneoActual.nombreTorneo}"></strong></p>
    <input type="hidden" name="torneoId" th:value="${torneoActual.id}"/>

    <section class="datos-equipo detalle-equipo">
        <img th:src="${equipo.escudoImagen}"
             th:alt="${equipo.nombre}"
             width="150"
             height="150"
             th:if="${equipo.escudoImagen != null}"/>

        <h2 th:text="${equipo.nombre}"></h2>
    </section>

    <section class="contenedor-boton-detalle">
        <a th:href="@{/admin/asignar-jugadoresNBA(id=${equipo.id})}" class="btn btn-naranja">EDITAR</a>
        <a th:href="@{/admin/listadoEquiposNBA}" class="btn btn-naranja">VOLVER</a>
    </section>


    <section class="plantel-actual">

        <section class="contenedor-subtitulo">
            <h2 class="titulo-plantel">PLANTEL</h2>

            <select id="ordenar" class="select-orden" onchange="ordenarTabla()">
                <option value="">Ordenar por...</option>
                <option value="nombre">Nombre A-Z</option>
                <option value="apellido">Apellido A-Z</option>
                <option value="edad">Edad</option>
            </select>
        </section>

        <p th:if="${plantel == null || plantel.isEmpty()}" class="mensaje-vacio">No hay jugadores asignados</p>

        <!-- Muestra la tabla solo si el plantel NO está vacío (ni es null). Hace la accion contraria al if-->
        <table th:unless="${plantel == null || plantel.isEmpty()}">
            <thead>
            <tr>
                <th>Foto</th>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Posición</th>
                <th>Nacionalidad</th>
                <th>Edad</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="jugador : ${plantel}">
                <td>
                    <img th:src="${jugador.foto}"
                         width="90"
                         height="90"
                         th:alt="${jugador.nombre}"/>
                </td>
                <td th:text="${jugador.nombre}">Nombre</td>
                <td th:text="${jugador.apellido}">Apellido</td>
                <td th:text="${jugador.posicion}">Posición</td>
                <td th:text="${jugador.nacionalidad}">Nacionalidad</td>
                <td th:text="${jugador.edad}">Edad</td>
            </tr>
            </tbody>
        </table>

    </section>


</main>

<div th:replace="layout/footer :: footer"></div>


<!-- JAVASCRITP-->
<script th:src="@{/js/admin-detallejugadores.js}"></script>

</body>
</html>
