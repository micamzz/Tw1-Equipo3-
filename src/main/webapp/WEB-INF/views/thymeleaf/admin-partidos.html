<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Admin - Partidos</title>
    <link rel="stylesheet" th:href="@{/css/header.css}"/>
    <link rel="stylesheet" th:href="@{/css/footer.css}"/>
    <link rel="stylesheet" th:href="@{/css/temporada.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>

<div th:replace="layout/header :: header"></div>

<main class="contenedor-admin-vista">

    <div class="acciones-superiores">
        <h1>Partidos</h1>
        <a th:href="@{/admin/agregarPartido}" class="btn btn-naranja">Agregar Partido</a>
        <a th:href="@{/admin/confirmarFinalizarTemporada}" class="btn btn-rojo">Finalizar Temporada</a>
    </div>

    <!-- Partidos activos -->
    <h2 class="subtitulo-seccion"><span class="badge-vivo">EN VIVO</span></h2>

    <div th:if="${#lists.isEmpty(partidosActivos)}" class="sin-partidos">
        No hay partidos en curso.
    </div>

    <div th:each="partido : ${partidosActivos}" class="card-partido-vivo">
        <div class="equipo-score">
            <img th:src="${partido.equipoLocal.escudoImagen}" class="escudo"
                 th:alt="${partido.equipoLocal.nombre}"/>
            <span th:text="${partido.equipoLocal.nombre}">Local</span>
        </div>

        <div class="centro-partido">
            <span class="estado-vivo">EN VIVO</span>
            <a th:href="@{/admin/partido(idPartido=${partido.id})}" class="btn btn-naranja">Gestionar</a>
        </div>

        <div class="equipo-score">
            <img th:src="${partido.equipoVisitante.escudoImagen}" class="escudo"
                 th:alt="${partido.equipoVisitante.nombre}"/>
            <span th:text="${partido.equipoVisitante.nombre}">Visitante</span>
        </div>
    </div>

    <!-- Partidos finalizados -->
    <h2 class="subtitulo-seccion" style="margin-top: 2rem;">Finalizados</h2>

    <div th:if="${#lists.isEmpty(partidosFinalizados)}" class="sin-partidos">
        No hay partidos finalizados.
    </div>

    <div th:each="partido : ${partidosFinalizados}" class="card-partido-finalizado">
        <div class="equipo-score">
            <img th:src="${partido.equipoLocal.escudoImagen}" class="escudo"
                 th:alt="${partido.equipoLocal.nombre}"/>
            <span th:text="${partido.equipoLocal.nombre}">Local</span>
        </div>

        <div class="centro-partido">
            <span class="estado-finalizado">FINALIZADO</span>
            <span class="duracion" th:text="'Duración: ' + ${partido.minutoFin} + ' min'">48 min</span>
        </div>

        <div class="equipo-score">
            <img th:src="${partido.equipoVisitante.escudoImagen}" class="escudo"
                 th:alt="${partido.equipoVisitante.nombre}"/>
            <span th:text="${partido.equipoVisitante.nombre}">Visitante</span>
        </div>
    </div>

</main>

<div th:replace="layout/footer :: footer"></div>
</body>
</html>
