<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Alta Equipo NBA</title>

    <link rel="stylesheet" th:href="@{/css/header.css}"/>
    <link rel="stylesheet" th:href="@{/css/footer.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin-alta-equipoNBA.css}"/>

    <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
    />
</head>

<body>

<!-- HEADER ADMIN -->
<div th:replace="layout/admin-header :: header-admin"></div>

<main class="contenedor-principal">

    <section class="contenedor-form-equipo">

        <div class="encabezado-formulario">
            <p class="etiqueta-seccion">EQUIPOS OFICIALES</p>
            <h1>Dar de alta un equipo NBA</h1>
            <p class="descripcion-formulario">
                Ingresá los datos del equipo oficial que participará en el torneo actual.
            </p>
        </div>

        <form th:action="@{/admin/guardarEquipoNBA}"
              method="post"
              th:object="${equipoNBA}">

            <div class="informacion-torneo">

                <div class="dato-torneo">
                    <span class="dato-etiqueta">Temporada</span>
                    <strong th:text="${torneoActual.temporada.nombre}">
                        Temporada actual
                    </strong>
                </div>

                <div class="dato-torneo">
                    <span class="dato-etiqueta">Torneo</span>
                    <strong th:text="${torneoActual.nombreTorneo}">
                        Torneo actual
                    </strong>
                </div>

            </div>

            <input type="hidden"
                   name="torneoId"
                   th:value="${torneoActual.id}"/>

            <div class="campo-formulario">

                <label for="nombreEquipo">
                    Nombre del equipo
                </label>

                <input
                        type="text"
                        th:field="*{nombre}"
                        id="nombreEquipo"
                        placeholder="Ejemplo: Los Angeles Lakers"
                        required
                />

            </div>

            <p th:if="${error}"
               th:text="${error}"
               class="mensaje-error">
            </p>

            <div class="acciones-formulario">

                <a th:href="@{/admin/equiposNBA}"
                   class="boton boton-secundario">
                    Cancelar
                </a>

                <button type="submit"
                        class="boton boton-primario">
                    Siguiente
                </button>

            </div>

        </form>

    </section>

</main>

<!-- FOOTER -->
<div th:replace="layout/footer :: footer"></div>

</body>
</html>
