<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Listado Equipos NBA</title>
    <link rel="stylesheet" th:href="@{/css/header.css}"/>
    <link rel="stylesheet" th:href="@{/css/footer.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin-asignar-jugadores.css}"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>

<div th:replace="layout/header :: header"></div>

<main class="contenedor-admin-vista">

    <div class="acciones-superiores">
        <h1>EQUIPOS NBA</h1>
        <a th:href="@{/admin/altaEquipoNBA}" class="btn btn-naranja"> NUEVO EQUIPO</a>
    </div>

    <div th:if="${error}" style="background:#f8d7da;color:#721c24;padding:12px;border-radius:6px;margin-bottom:16px;text-align:center;" th:text="${error}">Error</div>

    <table class="tabla-torneos">
        <thead>
        <tr>
            <th>Escudo</th>
            <th>Nombre</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="equipo : ${equipos}">

            <td>
                <a th:href="@{/admin/detalleEquipoNBA(id=${equipo.id})}">
                    <img th:src="${equipo.escudoImagen}"
                         th:alt="${equipo.nombre}"
                         width="80"
                         th:if="${equipo.escudoImagen != null}"/>
                    <span th:unless="${equipo.escudoImagen != null}">—</span>
                </a>
            </td>

            <td th:text="${equipo.nombre}">Nombre</td>

            <td>
                <a th:href="@{/admin/detalleEquipoNBA(id=${equipo.id})}" class="btn btn-naranja">VER</a>

                <a th:href="@{/admin/asignar-jugadoresNBA(id=${equipo.id})}" class="btn btn-naranja">EDITAR</a>

                <form th:action="@{/admin/eliminarEquipoNBA}" method="post" style="display:inline">
                    <input type="hidden" name="idEquipo" th:value="${equipo.id}">
                    <button type="submit" class="btn btn-rojo">BORRAR</button>
                </form>
            </td>

        </tr>
        </tbody>
    </table>

</main>

<div th:replace="layout/footer :: footer"></div>

</body>
</html>
