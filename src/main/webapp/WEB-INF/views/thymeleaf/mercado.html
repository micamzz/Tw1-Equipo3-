<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <title>Mercado de Jugadores</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />

    <!-- custom style -->
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <link rel="stylesheet" th:href="@{/css/mercado.css}" />
  </head>
  <body>
  <header th:fragment="header">
    <nav class="navbar-mercado">
      <a class="logo" th:href="@{/home}">
        <span class="color-naranja"> Unlam </span> Basket</a>
      <!-- <span class="nav-brand-text">UNLAM Basket</span> -->
        <form class ="form-busqueda" th:action= "@{/mercado}" method="get">
            <input type="hidden" name="posicion" th:value="${posicion}"/>
            <div class="search-wrapper">
                <input type="text" name="nombre" th:value="${nombre}" placeholder="Buscar por nombre o apellido..." class="input-busqueda"/>
            </div>
        </form>
        <nav class="nav-links">
          <!--  <a th:href="@{/ver-equipo.html}" class="nav-link-mercado">Ver equipo</a> -->
          <!-- <a th:href="@{/index}" class="nav-link-mercado">Mi perfil</a> -->
         <a th:href="@{/home}" class="link">Home</a>
         <a th:href="@{/mercado}" class="link">Mercado</a>
         <a th:href="@{/reglas}" class="link">Reglas</a>
          <div class="avatar-wrapper">
            <button class="avatar-btn"
                    th:text="${usuario != null ? usuario.nombre.substring(0,1).toUpperCase() : 'U'}"
                    onclick="toggleDropdown(this)">U</button>
            <div class="avatar-menu">
              <a th:href="@{/perfil}" class="avatar-menu-item">Mi perfil</a>
              <a th:href="@{/salir}" class="avatar-menu-item">Cerrar sesi&oacute;n</a>
            </div>
          </div>
       </nav>
   </nav>
 </header>
   <main class="contenido-principal">
     <div class="filtros-section">
       <form th:action="@{/mercado}" method="get">
         <input type="hidden" name="nombre" th:value="${nombre}" />
         <label for="posicion" class="filtro-label">Posición: </label>
         <select
           name="posicion"
           id="posicion"
           class="filtro-select"
           onchange="this.form.submit()"
         >
           <option value="" th:selected="${posicion ==null}">Todos</option>
           <option
             value="BASE"
             th:selected="${posicion != null and posicion == 'BASE'}"
           >
             Base
           </option>
           <option
             value="ALERO"
             th:selected="${posicion != null and posicion == 'ALERO'}"
           >
             Alero
           </option>
           <option
             value="PIVOT"
             th:selected="${posicion != null and posicion == 'PIVOT'}"
           >
             Pivot
           </option>
         </select>
       </form>
     </div>
     <div class="jugadores-grid">
       <div class="jugador-card" th:each="jugador:${jugadores}">
         <img
           th:src="${jugador.foto}"
           th:alt="${jugador.nombre + ' ' + jugador.apellido}"
           class="jugador-avatar"
         />
         <p
           class="jugador-nombre"
           th:text="${jugador.nombre + ' ' + jugador.apellido}"
         >
           Nombre Apellido
         </p>
         <span
           class="posicion-badge"
           th:classappend="${jugador.posicion.name() == 'BASE' ? 'badge-base':
                                                       (jugador.posicion.name() == 'ALERO' ? 'badge-alero' : 'badge-pivot')}"
           th:text="${jugador.posicion}"
         >
         </span>
         <p
           class="jugador-precio"
           th:text="${'$ ' + #numbers.formatInteger(jugador.precio, 1, 'COMMA')}"
         >
           $ 0
         </p>

         <a th:href = "@{/jugador/{id}(id=${jugador.id})}" class="btn-detalle">Ver detalle</a>


       </div>
       <p th:if="${#lists.isEmpty(jugadores)}" class="sin-resultados">
         No se encontraron jugadores.
       </p>
     </div>

     <script>
       document.querySelector(".form-busqueda").addEventListener("submit", function(e) {
         const nombre = this.querySelector('input[name="nombre"]').value;
         if (!nombre || nombre.trim() === "") {
           e.preventDefault();
           window.location.href = "/tallerwebi_base_war_exploded/mercado";
         }
       });
       function toggleDropdown(btn) {
         const menu = btn.nextElementSibling;
         menu.classList.toggle("open");
       }
       document.addEventListener("click", function(e) {
         if (!e.target.closest(".avatar-wrapper")) {
           document.querySelectorAll(".avatar-menu").forEach(d => d.classList.remove("open"));
         }
       });
     </script>
     <!-- Boostrap core js -->
      <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
        crossorigin="anonymous"
      ></script>
    </main>
    <footer class="footer-mercado">
      <ul class="footer-lista">
        <li>Federico, Sabrina</li>
        <li>Lopez, Sofia</li>
        <li>Mazza, Micaela</li>
        <li>Moyano Vivas, Matias</li>
        <li>Virzi, Valentin</li>
      </ul>
      <p class="footer-copy">© 2026 - Taller Web</p>
    </footer>
  </body>
</html>
