<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <title>Mercado de Jugadores</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
          crossorigin="anonymous">

    <!-- custom style -->
    <link rel="stylesheet" th:href="@{/css/main.css}" />
    <link rel="stylesheet" th:href="@{/css/mercado.css}" />
</head>
<body>
    <nav class="navbar-mercado">
        <form class ="form-busqueda" th:action= "@{/mercado}" method="get">
            <input type="hidden" name="posicion" th:value="${posicion}"/>
            <div class="search-wrapper">
                <span class="search-icon">&#128269</span>
                <input type="text" name="nombre" th:value="${nombre}" placeholder="Buscar por nombre o apellido..." class="input-busqueda"/>
            </div>
        </form>
        <span class="nav-brand-text">UNLAM Fantasy</span>
    </nav>
<main class="contenido-principal">
    <div class="filtros-section">
        <form th:action="@{/mercado}" method="get">
            <input type="hidden" name="nombre" th:value="${nombre}"/>
            <label for="posicion" class="filtro-label">Posición: </label>
            <select name="posicion" id="posicion" class="filtro-select" onchange="this.form.submit()">
                <option value="" th:selected="${posicion ==null}">Todas</option>
                <option value="BASE" th:selected="${posicion != null and posicion == 'BASE'}">Base</option>
                <option value="ALERO" th:selected="${posicion != null and posicion == 'ALERO'}">Alero</option>
                <option value="PIVOT" th:selected="${posicion != null and posicion == 'PIVOT'}">Pivot</option>
            </select>
        </form>
    </div>
    <div class="jugadores-grid">
        <div class="jugador-card" th:each="jugador:${jugadores}">
            <div class="jugador-avatar" th:classappend="${jugador.posicion.name() == 'BASE' ? 'avatar-base':
                                                    (jugador.posicion.name() == 'ALERO' ? 'avatar-alero' : 'avatar-pivot')}"
                 th:text="${#strings.substring(jugador.nombre,0,1) + #strings.substring(jugador.apellido,0,1)}">
            </div>
                <p class="jugador-nombre" th:text="${jugador.nombre + ' ' + jugador.apellido}"> Nombre Apellido</p>
                <span class="posicion-badge" th:classappend="${jugador.posicion.name() == 'BASE' ? 'badge-base':
                                                        (jugador.posicion.name() == 'ALERO' ? 'badge-alero' : 'badge-pivot')}"
                  th:text="${jugador.posicion}">
                </span>
            <p class="jugador-precio" th:text="${'$ ' + #numbers.formatInteger(jugador.precio, 1, 'COMMA')}">$ 0</p>

          <!--Mica fijate que este boton sirve para poner a cada jugador con su equipo deberias conectarlo con la clase que se muestre en el equipo o que se guarde en algun lado esta info -->
                <button type="submit" class="btn-fichar">Fichar</button>
        </div>
        <p th:if="${#lists.isEmpty(jugadores)}" class="sin-resultados">
            No se encontraron jugadores.
        </p>
    </div>

    <script>
        document.querySelector('.form-busqueda').addEventListener('submit', function(e) {
            const nombre = this.querySelector('input[name="nombre"]').value;
            if (!nombre || nombre.trim() === '') {
                e.preventDefault();
                window.location.href = '/tallerwebi_base_war_exploded/mercado';
            }
        });
    </script>
    <!-- Boostrap core js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4"
            crossorigin="anonymous"></script>
</main>
</body>
</html>
